services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Monta el JSON de cuenta de servicio de Firebase como archivo de solo lectura.
      # Genera este archivo en: Firebase Console → Configuración del proyecto →
      # Cuentas de servicio → Generar nueva clave privada.
      - ./firebase.json:/run/secrets/firebase.json:ro
    restart: unless-stopped
